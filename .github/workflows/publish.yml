name: Publish to NuGet

on:
  push:
    branches: [ main ]

jobs:
  build_and_publish:
    runs-on: windows-latest
    
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build the project
      run: dotnet build ./ScreenBorderDrawer/ScreenBorderDrawer.csproj --configuration Release

    - name: Pack the project into a .nupkg
      run: dotnet pack ./ScreenBorderDrawer/ScreenBorderDrawer.csproj --configuration Release --no-build --output ./nupkg

    - name: NuGet login (OIDC)
      uses: NuGet/login@v1
      id: login
      with:
        user: billthenut 

    - name: Push to NuGet.org
      run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
